<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azeem Studio Pro | AI Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #02040a; color: #e6edf3; }
        .premium-card { background: #0d1117; border: 1px solid #30363d; border-radius: 24px; }
        .btn-pay { background: #5865f2; color: white; transition: 0.3s; }
        .btn-pay:hover { background: #4752c4; transform: scale(1.02); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0d1117] border-r border-[#30363d] p-6 flex flex-col">
        <div class="flex items-center space-x-2 mb-10 text-indigo-500">
            <i class="fas fa-microphone-alt text-2xl"></i>
            <span class="font-black uppercase tracking-tighter text-white">Azeem Studio</span>
        </div>
        
        <nav class="flex-1 space-y-4">
            <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Main Menu</div>
            <a href="#" class="flex items-center text-indigo-400 font-bold text-sm"><i class="fas fa-house mr-3"></i> Dashboard</a>
            <a href="#" class="flex items-center text-gray-500 hover:text-white font-bold text-sm"><i class="fas fa-magic mr-3"></i> Voice Lab</a>
        </nav>

        <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800">
            <p class="text-[10px] font-black text-gray-500 uppercase">Your Credits</p>
            <p class="text-xl font-black text-white">👑 UNLIMITED</p>
            <button onclick="document.getElementById('payModal').style.display='flex'" class="w-full mt-3 py-2 bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 rounded-lg text-[10px] font-black uppercase">Buy More</button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-4xl font-black mb-8 uppercase tracking-tighter">Create News Script</h2>
            
            <div class="premium-card p-6 shadow-2xl">
                <textarea class="w-full h-64 bg-transparent border-none outline-none text-lg text-white placeholder-gray-700 resize-none" placeholder="Azeem bhai, apni 3000 words ki story yahan likhein..."></textarea>
                
                <div class="mt-6 pt-6 border-t border-gray-800 flex justify-between items-center">
                    <div class="flex items-center space-x-2 text-gray-500 text-xs font-bold uppercase">
                        <i class="fas fa-volume-up"></i>
                        <span>Voice: Adam (Male)</span>
                    </div>
                    <button class="btn-pay px-8 py-3 rounded-xl font-black uppercase text-xs">Generate Audio</button>
                </div>
            </div>
        </div>
    </main>

    <div id="payModal" style="display:none;" class="fixed inset-0 bg-black/90 items-center justify-center z-50 p-6">
        <div class="bg-[#0d1117] border border-gray-800 p-10 rounded-[40px] max-w-sm w-full text-center relative">
            <button onclick="document.getElementById('payModal').style.display='none'" class="absolute top-5 right-5 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 class="text-2xl font-black uppercase mb-2">Recharge Now</h3>
            <p class="text-xs text-gray-500 font-bold mb-8">Paisa direct Azeem bhai ke bank mein jaye ga</p>
            
            <div class="space-y-3 mb-8">
                <div class="p-4 bg-gray-900 border border-gray-800 rounded-2xl flex justify-between items-center">
                    <span class="font-bold text-sm">Starter Pack</span>
                    <span class="text-indigo-400 font-black">PKR 1,500</span>
                </div>
                <div class="p-4 bg-gray-900 border border-indigo-500 rounded-2xl flex justify-between items-center">
                    <span class="font-bold text-sm">Pro Pack</span>
                    <span class="text-indigo-400 font-black">PKR 4,500</span>
                </div>
            </div>

            <button class="w-full btn-pay py-4 rounded-2xl font-black uppercase tracking-widest text-xs">Pay via JazzCash</button>
        </div>
    </div>

</body>
</html>
